    padding:24px;
  }
  .login-card{
    width:100%;max-width:400px;background:var(--card);border-radius:20px;
    padding:36px 32px 32px;box-shadow:0 30px 60px rgba(0,0,0,.45);
    text-align:center;
  }
  .crest{
    width:64px;height:64px;border-radius:50%;
    display:block;margin:0 auto 14px;
    object-fit:cover;border:3px solid #fff;
    box-shadow:0 4px 14px rgba(201,162,39,.5);
    background:#fff;
  }
  .login-card h1{font-size:19px;color:var(--navy);letter-spacing:.3px;}
  .login-card p.sub{color:var(--muted);font-size:12.5px;margin-top:4px;letter-spacing:1px;text-transform:uppercase;}
  .role-tabs{display:flex;gap:6px;margin:22px 0 18px;background:var(--bg);padding:5px;border-radius:10px;}
  .role-tab{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted);transition:.15s;}
  .role-tab.active{background:var(--navy);color:#fff;}
  .field{text-align:left;margin-bottom:12px;}
  .field label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px;}
  .field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;outline:none;background:#fff;}
  .field input:focus,.field select:focus{border-color:var(--blue);}
  .btn-primary{
    width:100%;padding:12px;border:none;border-radius:9px;background:var(--blue);color:#fff;
    font-weight:700;font-size:14.5px;margin-top:6px;transition:.15s;
  }
  .btn-primary:hover{background:var(--navy);}
  .demo-hint{margin-top:16px;font-size:11.5px;color:var(--muted);background:var(--bg);padding:10px;border-radius:8px;text-align:left;line-height:1.6;}
  .login-err{color:var(--red);font-size:12.5px;margin-top:8px;min-height:14px;}

  /* ---------- APP SHELL ---------- */
  #appScreen{display:none;min-height:100vh;}
  .shell{display:flex;min-height:100vh;}
  .sidebar{
    width:230px;background:var(--navy);color:#fff;display:flex;flex-direction:column;
    flex-shrink:0;
  }
  .sidebar .brand{padding:22px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;gap:10px;align-items:center;}
  .sidebar .brand .crest{width:36px;height:36px;font-size:13px;margin:0;}
  .sidebar .brand div b{display:block;font-size:14px;line-height:1.2;}
  .sidebar .brand div span{font-size:10px;color:#B7C3DA;}
  .nav{flex:1;padding:14px 10px;}
  .nav button{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    color:#C7D1E6;padding:11px 12px;border-radius:9px;font-size:13.5px;margin-bottom:3px;font-weight:500;
  }
  .nav button .ic{width:18px;text-align:center;}
  .nav button.active{background:var(--blue);color:#fff;}
  .nav button:hover:not(.active){background:rgba(255,255,255,.08);}
  .logout-wrap{padding:14px;border-top:1px solid rgba(255,255,255,.1);}
  .logout-wrap button{width:100%;background:rgba(255,255,255,.08);border:none;color:#fff;padding:10px;border-radius:9px;font-size:13px;font-weight:600;}

  .main{flex:1;min-width:0;}
  .topbar{
    background:#fff;border-bottom:1px solid var(--line);padding:16px 28px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .topbar h2{font-size:19px;color:var(--navy);}
  .topbar .who{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
  .content{padding:26px 28px;}

  .grid{display:grid;gap:16px;}
  .grid-5{grid-template-columns:repeat(5,1fr);}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:2fr 1fr;}
  @media(max-width:1100px){.grid-5{grid-template-columns:repeat(3,1fr);} .grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}
  .stat-card{padding:16px;}
  .stat-card .label{font-size:11.5px;color:var(--muted);font-weight:600;}
  .stat-card .val{font-size:24px;font-weight:800;margin-top:6px;color:var(--navy);}
  .stat-card.green .val{color:var(--green);}
  .stat-card.red .val{color:var(--red);}
  .stat-card.blue .val{color:var(--blue);}

  .section-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;border-bottom:1.5px solid var(--line);}
  td{padding:10px 10px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .pill.present{background:var(--green-bg);color:var(--green);}
  .pill.absent{background:var(--red-bg);color:var(--red);}
  .pill.od{background:var(--blue-bg);color:var(--blue);}
  .status-btn{border:none;cursor:pointer;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;font-family:inherit;}
  .status-btn.present{background:var(--green-bg);color:var(--green);}
  .status-btn.absent{background:var(--red-bg);color:var(--red);}
  .status-btn.od{background:var(--blue-bg);color:var(--blue);}
  .status-btn:hover{filter:brightness(0.95);}
  .status-select{border:1.5px solid transparent;cursor:pointer;padding:4px 26px 4px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;-moz-appearance:none;background-repeat:no-repeat;background-position:right 8px center;background-size:9px;}
  .status-select.present{background-color:var(--green-bg);color:var(--green);background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%231C9A5B" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');}
  .status-select.absent{background-color:var(--red-bg);color:var(--red);background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%23D8434A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');}
  .status-select.od{background-color:var(--blue-bg);color:var(--blue);background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%232B63C9" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');}
  .status-select.unmarked{background-color:#EEF0F4;color:var(--muted);border:1.5px dashed #C7CCD9;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%236B7688" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');}
  .status-select:hover{filter:brightness(0.95);}
  .status-select:focus{border-color:currentColor;}
  .status-select:disabled{cursor:default;opacity:0.55;filter:grayscale(0.4);}
  .status-select:disabled:hover{filter:grayscale(0.4);}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .toolbar input,.toolbar select{padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
  .toolbar input[type=text]{flex:1;min-width:180px;}
  .btn{padding:9px 16px;border-radius:8px;border:none;font-weight:700;font-size:13px;}
  .btn.blue{background:var(--blue);color:#fff;}
  .btn.green{background:var(--green);color:#fff;}
  .btn.outline{background:#fff;border:1.5px solid var(--line);color:var(--navy);}
  .btn.gray{background:#eef1f6;color:var(--navy);}
  .btn.red{background:var(--red);color:#fff;}
  .btn.sm{padding:6px 10px;font-size:12px;}

  .progress-wrap{background:#eef1f6;border-radius:20px;height:7px;overflow:hidden;margin-top:6px;}
  .progress-bar{height:100%;background:var(--green);border-radius:20px;}

  .modal-bg{position:fixed;inset:0;background:rgba(15,25,45,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;overflow:auto;}
  .modal{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:420px;}
  .modal h3{color:var(--navy);margin-bottom:16px;font-size:16px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}

  .empty{text-align:center;color:var(--muted);padding:30px;font-size:13.5px;}
  .attn-radio{display:flex;gap:12px;flex-wrap:wrap;}
  .attn-radio label{font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer;}
  .dept-tag{font-size:11px;color:var(--muted);}
  .badge-dept{display:inline-block;background:var(--blue-bg);color:var(--blue);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <img class="crest" src="" id="loginCrestImg" alt="TJS Engineering College logo">
    <h1>TJS Engineering College</h1>
    <p class="sub">Attendance Management System</p>

    <div class="role-tabs" id="roleTabs">
      <button class="role-tab active" data-role="admin">Admin</button>
      <button class="role-tab" data-role="staff">Staff</button>
      <button class="role-tab" data-role="student">Student</button>
      <button class="role-tab" data-role="principal">Principal</button>
    </div>

    <div class="field">
      <label id="userLabel">Username</label>
      <input type="text" id="loginUser" placeholder="Enter username">
    </div>
    <div class="field">
      <label id="passLabel">Password</label>

/* ============================================================
   ATTENDANCE CELL VALUES
   Normally a cell is just the string 'present' | 'absent' | 'od'.
   When a student is marked OD, staff can attach a short comment
   (reason for being on duty), in which case the cell is stored as
   { status:'od', comment:'...' } instead of a plain string.
   These two helpers let the rest of the app read either shape
   without caring which one it is.
   ============================================================ */
function cellStatus(val){ return val && typeof val === 'object' ? val.status : (val || null); }
function cellComment(val){ return val && typeof val === 'object' ? (val.comment || '') : ''; }

async function loadState(){
  const { data, error } = await sb.from('ams_state').select('*').eq('id',1).maybeSingle();
  if(error) throw error;
  if(!data){
    _state = defaultSeed();
    const { error: insErr } = await sb.from('ams_state').insert({
      id:1, admin:_state.admin, students:_state.students, staff:_state.staff, attendance:_state.attendance
    });
    if(insErr) throw insErr;
  } else {
    _state = {
      admin: data.admin || defaultSeed().admin,
      students: data.students || [],
      staff: data.staff || [],
      attendance: data.attendance || {}
    };
  }
}

async function saveState(){
  const { error } = await sb.from('ams_state').update({
    admin:_state.admin, students:_state.students, staff:_state.staff, attendance:_state.attendance,
    updated_at: new Date().toISOString()
  }).eq('id',1);
  if(error) console.error('Supabase save failed:', error);
  return !error;
}
async function refreshStaffFromServer(){
  // Picks up admin changes (like period assignments) made after this session started,
  // without requiring the staff member to log out and back in.
  try{
    const { data, error } = await sb.from('ams_state').select('staff').eq('id',1).maybeSingle();
    if(!error && data && data.staff){ _state.staff = data.staff; }
  }catch(e){ console.error('Could not refresh staff list:', e); }
}

async function saveAttendancePeriod(date, period, edits){
  // edits = { regNo: status, ... } for just the students being saved right now.
  const { data, error: fetchErr } = await sb.from('ams_state').select('attendance').eq('id',1).maybeSingle();
  if(fetchErr){ console.error('Could not refresh attendance before saving:', fetchErr); return false; }
  const latestAttendance = (data && data.attendance) ? data.attendance : {};
  const dayRecord = Object.assign({}, latestAttendance[date] || {});
  const periodRecord = Object.assign({}, dayRecord[period] || {});
  Object.keys(edits).forEach(reg=>{ periodRecord[reg] = edits[reg]; });
  dayRecord[period] = periodRecord;
  latestAttendance[date] = dayRecord;
  const { error: saveErr } = await sb.from('ams_state').update({
    attendance: latestAttendance,
    updated_at: new Date().toISOString()
  }).eq('id',1);
  if(saveErr){ console.error('Supabase save failed:', saveErr); return false; }
  _state.attendance = latestAttendance;
  return true;
}

function staffSubjectsOf(rec){
  if(!rec) return [];
  if(Array.isArray(rec.subjects) && rec.subjects.length) return rec.subjects;
  if(rec.dept){ return [{subject:rec.subject||'', dept:rec.dept, year:'', section:'', periods:Array.isArray(rec.periods)?rec.periods:[]}]; }
  return [];
}
function staffDepts(rec){ return [...new Set(staffSubjectsOf(rec).map(x=>x.dept).filter(Boolean))]; }
function classLabel(subj){
  const bits = [deptLabel(subj.dept)];
  if(subj.year) bits.push('Yr '+subj.year);
  if(subj.section) bits.push('Sec '+subj.section);
  return `${subj.subject||'Subject'} — ${bits.join(', ')}`;
}

async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  let ok = false;

  const loginBtn = document.querySelector('#loginScreen .btn-primary');
  if(loginBtn){ loginBtn.disabled = true; loginBtn.textContent = 'Checking…'; }
  try{ await loadState(); }catch(e){ console.error('Could not refresh data before login:', e); }
  if(loginBtn){ loginBtn.disabled = false; loginBtn.textContent = 'Login'; }

  if(currentRole==='student'){
    const uLower = u.toLowerCase();
    const match = getStudents().find(s =>
      (s.name.toLowerCase()===uLower || s.reg.toLowerCase()===uLower) && s.dob && s.dob===p
    );
    if(match){ ok=true; currentUser = {...match}; }
  } else if(currentRole==='staff'){
    const match = getStaff().find(s=>s.name.toLowerCase()===u.toLowerCase());
    if(match && match.password && p===match.password){ ok=true; currentUser = {...match}; }
  } else if(currentRole==='principal'){

/* ============================================================
   HELPERS: compute attendance stats
   OD (On Duty) counts towards the attendance percentage, same as Present,
   but is tracked and reported separately — this matches how most colleges
   treat On-Duty leave (e.g. for events/symposiums).
   ============================================================ */
function studentStats(reg){
  // Each period on each date counts as one "class instance" towards the percentage.
  const att = getAttendance();
  let present=0, absent=0, od=0, total=0;
  Object.values(att).forEach(dayRecord=>{
    PERIODS.forEach(p=>{
      const periodRecord = dayRecord[p];
      if(periodRecord && periodRecord[reg]){
        total++;
        const st = cellStatus(periodRecord[reg]);
        if(st==='present') present++;
        else if(st==='absent') absent++;
        else if(st==='od') od++;
      }
    });
  });
  const pct = total? Math.round((present+od)/total*100):0;
  return {present, absent, od, total, pct};
}
function overallStats(deptFilter){
  // "Today" totals are summed across every period marked so far today.
  let students = getStudents();
  if(deptFilter && (Array.isArray(deptFilter) ? deptFilter.length : true)){
    students = students.filter(s => Array.isArray(deptFilter) ? deptFilter.includes(s.dept) : s.dept===deptFilter);
  }
  const att = getAttendance();
  const today = todayStr();
  const todayRecord = att[today] || {};
  let presentToday=0, absentToday=0, odToday=0;
  const periodsMarked = PERIODS.filter(p=>todayRecord[p] && Object.keys(todayRecord[p]).length);
  periodsMarked.forEach(p=>{
    students.forEach(s=>{
      const st = cellStatus(todayRecord[p][s.reg]);
      if(st==='present') presentToday++;
      else if(st==='absent') absentToday++;
      else if(st==='od') odToday++;
    });
  });
  return {total: students.length, presentToday, absentToday, odToday, marked: presentToday+absentToday+odToday, periodsMarked: periodsMarked.length};
}

/* ============================================================
   BAR CHART HELPER — simple flat CSS bars (no chart library needed).
   Used by the Principal overview and the HOD department overview.
   Takes rows: [{ label, present, absent, total }]
   ============================================================ */
function barChartRowsHTML(rows){
  const maxTotal = Math.max(1, ...rows.map(r=>r.total));
  return rows.map(r=>{
    const presentPct = r.total ? Math.round((r.present/maxTotal)*100) : 0;
    const absentPct = r.total ? Math.round((r.absent/maxTotal)*100) : 0;
    const attendancePct = r.total ? Math.round((r.present/r.total)*100) : 0;
    return `
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
          <span style="font-weight:700;color:var(--navy);">${r.label}</span>
          <span style="color:var(--muted);">${r.present} present · ${r.absent} absent · <b style="color:${attendancePct>=75?'var(--green)':'var(--red)'}">${attendancePct}%</b></span>
        </div>
        <div style="display:flex;height:16px;border-radius:8px;overflow:hidden;background:#eef1f6;">
          <div style="width:${presentPct}%;background:var(--green);"></div>
          <div style="width:${absentPct}%;background:var(--red);"></div>
        </div>
      </div>`;
  }).join('');
}
function computeDeptPresentAbsent(deptCodes, dateFrom, dateTo){
  // Sums present/absent across every period, for every date in [dateFrom, dateTo], per department.
  const students = getStudents().filter(s=>deptCodes.includes(s.dept));
  const att = getAttendance();
  const byDept = {};
  deptCodes.forEach(code=>{ byDept[code] = {present:0, absent:0, total:0}; });
  Object.keys(att).forEach(date=>{
    if(date < dateFrom || date > dateTo) return;
    PERIODS.forEach(p=>{
      const periodRecord = att[date][p];
      if(!periodRecord) return;
      students.forEach(s=>{
        const st = cellStatus(periodRecord[s.reg]);
        if(!st) return;
        byDept[s.dept].total++;
        if(st==='present' || st==='od') byDept[s.dept].present++;
        else if(st==='absent') byDept[s.dept].absent++;
      });
    });
  });
  return byDept;
}

function parseCSVLine(line){
  // simple CSV split that also handles quoted fields containing commas
  const result = [];
  let cur = '', inQuotes = false;
  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(ch==='"'){ inQuotes = !inQuotes; }
    else if(ch===',' && !inQuotes){ result.push(cur.trim()); cur=''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}
function processBulkUpload(){
  const fileInput = document.getElementById('bulkCSVFile');
  const msg = document.getElementById('bulkUploadMsg');
  const file = fileInput.files[0];
  if(!file){ msg.textContent = 'Please choose a CSV file first.'; return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
      if(lines.length < 2){ msg.textContent = 'CSV file appears to be empty.'; return; }
      const header = parseCSVLine(lines[0]).map(h=>h.toLowerCase());
      const required = ['reg','name','dept','year','section','mobile','dob'];
      const missing = required.filter(r=>!header.includes(r));
      if(missing.length){ msg.textContent = 'Missing required column(s): ' + missing.join(', '); return; }
      const idx = {};
      required.forEach(r=> idx[r] = header.indexOf(r));

      let students = getStudents();
      let added = 0, updated = 0, skipped = 0;
      for(let i=1;i<lines.length;i++){
        const cols = parseCSVLine(lines[i]);
        const reg = (cols[idx.reg]||'').trim();
        const name = (cols[idx.name]||'').trim();
        if(!reg || !name){ skipped++; continue; }
        const rec = {
          reg,
          name,
          dept: (cols[idx.dept]||'').trim(),
          year: (cols[idx.year]||'').trim(),
          section: (cols[idx.section]||'').trim(),
          mobile: (cols[idx.mobile]||'').trim(),
          dob: (cols[idx.dob]||'').trim()
        };
        const existingIdx = students.findIndex(s=>s.reg===reg);
        if(existingIdx>=0){ students[existingIdx] = rec; updated++; }
        else { students.push(rec); added++; }
      }
      setStudents(students);
      document.querySelector('.modal-bg').remove();
      renderPage();
      alert(`Bulk upload complete.\nAdded: ${added}\nUpdated: ${updated}\nSkipped (missing reg/name): ${skipped}`);
    } catch(err){
      msg.textContent = 'Could not read this file. Make sure it is a valid CSV.';
    }
  };
  reader.readAsText(file);
}

/* ============================================================
   BULK STAFF UPLOAD (admin) — CSV import
   Preferred columns: id,name,mobile,password,subjects
   "subjects" holds one or more class assignments, separated by ; —
   each assignment is Subject|Department|Year|Section|Periods
   (Year, Section, Periods may be left blank). Example:
   "OS|CSE|II||1,2;DBMS|ECE|III||3,4"
   For simple single-subject staff, the legacy columns
   dept,subject,periods are still accepted instead of "subjects".
   Staff log in with their NAME + password. "id" is just an
   internal unique reference (like an employee code).
   ============================================================ */
function parseSubjectsCell(raw){
  if(!raw) return null;
  const rows = raw.split(';').map(part=>part.trim()).filter(Boolean).map(part=>{
    const bits = part.split('|').map(b=>b.trim());
    const subject = bits[0]||'', dept = bits[1]||'', year = bits[2]||'', section = bits[3]||'', periodsRaw = bits[4]||'';
    const periods = periodsRaw ? periodsRaw.split(/[,]/).map(x=>Number(x.trim())).filter(n=>PERIODS.includes(n)) : [];
    return {subject, dept, year, section, periods};
  }).filter(x=>x.subject || x.dept);
  return rows.length ? rows : null;
}
function downloadStaffCSVTemplate(){
  const csv = 'id,name,mobile,password,subjects\nstaff001,Prof. Sample Name,9876543210,changeme123,"OS|CSE|II||1,2;DBMS|ECE|III||3,4"';
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'staff_template.csv'; a.click();
  URL.revokeObjectURL(url);
}

  bg.className='modal-bg';
  bg.innerHTML = `

        For staff who only teach one subject, the older columns <b>dept, subject, periods</b> also still work instead of <b>subjects</b>.<br>
        Staff log in using their <b>name</b> and <b>password</b> — "id" is just an internal reference and must be unique per staff member.
        Existing ids will be updated (password only changes if a new one is given); new ids will be added.
      </p>
      <button class="btn outline" style="margin-bottom:14px;" onclick="downloadStaffCSVTemplate()">⬇ Download CSV Template</button>
      <div class="field"><input type="file" id="bulkStaffCSVFile" accept=".csv"></div>

      <div class="modal-actions">
        <button class="btn gray" onclick="this.closest('.modal-bg').remove()">Cancel</button>

function processBulkStaffUpload(){
  const fileInput = document.getElementById('bulkStaffCSVFile');
  const msg = document.getElementById('bulkStaffUploadMsg');
  const file = fileInput.files[0];
  if(!file){ msg.textContent = 'Please choose a CSV file first.'; return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
      if(lines.length < 2){ msg.textContent = 'CSV file appears to be empty.'; return; }
      const header = parseCSVLine(lines[0]).map(h=>h.toLowerCase());
      const required = ['id','name','mobile','password'];
      const missing = required.filter(r=>!header.includes(r));
      if(missing.length){ msg.textContent = 'Missing required column(s): ' + missing.join(', '); return; }
      const idx = {};
      required.forEach(r=> idx[r] = header.indexOf(r));
      idx.subjects = header.indexOf('subjects');
      idx.dept = header.indexOf('dept');
      idx.subject = header.indexOf('subject');
      idx.periods = header.indexOf('periods');

      let staffList = getStaff();
      let added = 0, updated = 0, skipped = 0;
      for(let i=1;i<lines.length;i++){
        const cols = parseCSVLine(lines[i]);
        const id = (cols[idx.id]||'').trim();
        const name = (cols[idx.name]||'').trim();
        if(!id || !name){ skipped++; continue; }
        const mobile = (cols[idx.mobile]||'').trim();
        const password = (cols[idx.password]||'').trim();
        const subjectsRaw = idx.subjects>=0 ? (cols[idx.subjects]||'').trim() : '';
        let subjects = parseSubjectsCell(subjectsRaw);
        if(!subjects){
          const dept = idx.dept>=0 ? (cols[idx.dept]||'').trim() : '';
          const subject = idx.subject>=0 ? (cols[idx.subject]||'').trim() : '';
          const periodsRaw = idx.periods>=0 ? (cols[idx.periods]||'').trim() : '';
          const periods = periodsRaw ? periodsRaw.split(/[|,]/).map(x=>Number(x.trim())).filter(n=>PERIODS.includes(n)) : [];
          subjects = dept ? [{subject, dept, year:'', section:'', periods}] : null;
        }
        const existingIdx = staffList.findIndex(s=>s.id===id);
        if(existingIdx>=0){
          const prev = staffList[existingIdx];
          staffList[existingIdx] = {id,name,mobile,subjects: subjects || staffSubjectsOf(prev),password: password? password : prev.password};
          updated++;
        } else {
          if(!password || !subjects){ skipped++; continue; }
          staffList.push({id,name,mobile,subjects,password});
          added++;
        }
      }
      const dupNames = staffList.map(s=>s.name.toLowerCase()).filter((n,i,arr)=>arr.indexOf(n)!==i);
      setStaff(staffList);
      document.querySelector('.modal-bg').remove();
      renderPage();
      let summary = `Bulk upload complete.\nAdded: ${added}\nUpdated: ${updated}\nSkipped (missing id/name, or new staff with no password): ${skipped}`;
      if(dupNames.length){ summary += `\n\nWarning: duplicate staff name(s) found (${[...new Set(dupNames)].join(', ')}) — since staff log in by name, only one of them will be reachable. Consider renaming.`; }
      alert(summary);
    } catch(err){
      msg.textContent = 'Could not read this file. Make sure it is a valid CSV.';
    }
  };
  reader.readAsText(file);
}

function periodHeaderCells(){
  const assigned = getAssignedPeriods();
  return PERIODS.map(p=>{
    const editable = assigned.includes(p);
    return `<th>Period ${p}<br>${editable ? `<a href="#" style="font-size:10.5px;font-weight:600;" onclick="event.preventDefault();saveOnePeriodFromGrid(${p});">Save</a>` : `<span style="font-size:10.5px;font-weight:600;color:var(--muted);">View only</span>`}</th>`;

function updateAccessNote(){
  const assigned = getAssignedPeriods();
  const noteEl = document.getElementById('attAccessNote');
  if(!noteEl) return;
  if(currentRole==='staff' && assigned.length < PERIODS.length){
    noteEl.textContent = `You can take/save attendance for Period ${assigned.join(', ')} only for this class. Other periods are shown for reference and cannot be edited by you.`;
  } else {
    noteEl.textContent = '';
  }
}
function statusLabel(status){ return status==='absent' ? 'ABSENT' : status==='od' ? 'OD' : status==='present' ? 'PRESENT' : 'NOT MARKED'; }
function nextStatus(status){ return status==='present' ? 'absent' : status==='od' ? 'present' : 'od'; }
function odButtonLabel(comment){ return 'OD'+(comment?' 💬':''); }
function getAssignedPeriods(){
  // Admin has full access to every period.
  if(currentRole!=='staff') return PERIODS.slice();
  const rec = getStaff().find(s=>s.id===currentUser.id);
  const subjects = staffSubjectsOf(rec);
  if(subjects.length===0) return PERIODS.slice(); // no subjects configured yet = full access fallback
  const sel = document.getElementById('attClassSel');
  const subj = sel ? subjects[Number(sel.value)] : subjects[0];
  if(!subj || !Array.isArray(subj.periods) || subj.periods.length===0) return PERIODS.slice();
  return subj.periods.slice();
}
function drawAttendanceTable(){
  const date = document.getElementById('attDate').value;
  const deptSel = document.getElementById('attDept').value;
  const yearSel = (document.getElementById('attYear').value||'').trim();
  const sectionSel = (document.getElementById('attSection').value||'').trim();
  let students = getStudents();
  if(deptSel) students = students.filter(s=>s.dept===deptSel);
  if(yearSel) students = students.filter(s=>(s.year||'').toLowerCase()===yearSel.toLowerCase());
  if(sectionSel) students = students.filter(s=>(s.section||'').toLowerCase()===sectionSel.toLowerCase());
  const att = getAttendance();
  const dayRecord = att[date] || {};
  const tb = document.getElementById('attTbody');
  tb.innerHTML = students.length? '' : `<tr><td colspan="${PERIODS.length+3}" class="empty">No students found for this class.</td></tr>`;
  const assigned = getAssignedPeriods();
  students.forEach(s=>{
    const cells = PERIODS.map(p=>{
      const periodRecord = dayRecord[p] || {};
      const rawVal = periodRecord[s.reg];
      const status = cellStatus(rawVal) || 'unmarked';
      const comment = cellComment(rawVal);
      const title = comment ? ` title="${comment.replace(/"/g,'&quot;')}"` : '';
      const opt = (val,text)=>`<option value="${val}"${status===val?' selected':''}>${text}</option>`;
      const editable = assigned.includes(p);
      const disabledAttr = editable ? '' : ' disabled';
      return `<td><select class="status-select ${status}" data-reg="${s.reg}" data-period="${p}" data-status="${status}" data-comment="${comment.replace(/"/g,'&quot;')}"${title}${disabledAttr} onchange="onStatusSelectChange(this)">${opt('unmarked','NOT MARKED')}${opt('present','PRESENT')}${opt('absent','ABSENT')}${opt('od',odButtonLabel(comment))}</select></td>`;
    }).join('');
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${s.reg}</td><td>${s.name}</td><td><span class="badge-dept">${deptLabel(s.dept)}</span></td>${cells}`;
    tb.appendChild(tr);
  });
  const markedPeriods = PERIODS.filter(p=>dayRecord[p] && Object.keys(dayRecord[p]).length);
  document.getElementById('attPeriodSummary').textContent =
    `${markedPeriods.length} of 7 periods already have attendance saved for ${date}${markedPeriods.length? ' (Period '+markedPeriods.join(', ')+')':''}.`;
}
function applyStatusToButton(sel, status, comment){
  sel.dataset.status = status;
  sel.dataset.comment = comment || '';
  sel.className = 'status-select '+status;
  sel.value = status;
  const odOpt = sel.querySelector('option[value="od"]');
  if(odOpt) odOpt.textContent = odButtonLabel(comment);
  if(comment){ sel.title = comment; } else { sel.removeAttribute('title'); }
}
function onStatusSelectChange(sel){
  const chosen = sel.value;
  if(chosen==='od'){
    const comment = window.prompt('Reason for On Duty (optional):', sel.dataset.comment || '');
    if(comment===null){ sel.value = sel.dataset.status; return; } // staff cancelled — leave status unchanged
    applyStatusToButton(sel, 'od', comment.trim());
  } else {
    applyStatusToButton(sel, chosen, '');
  }
}

function markAllPresentGrid(){
  document.querySelectorAll('#attTbody .status-select:not(:disabled)').forEach(sel=>{
    applyStatusToButton(sel, 'present', '');
  });
}
function collectEditsForPeriod(period){
  const edits = {};
  document.querySelectorAll(`#attTbody .status-select[data-period="${period}"]`).forEach(sel=>{
    const status = (sel.dataset.status && sel.dataset.status!=='unmarked') ? sel.dataset.status : 'present';
    const comment = sel.dataset.comment;
    edits[sel.dataset.reg] = (status==='od' && comment) ? {status:'od', comment} : status;
  });
  return edits;
}
async function saveOnePeriodFromGrid(period){
  if(!getAssignedPeriods().includes(period)){
    alert('You are not assigned to Period '+period+', so it cannot be saved from your account.');
    return;
  }
  const date = document.getElementById('attDate').value;
  const deptSel = document.getElementById('attDept').value;
  const edits = collectEditsForPeriod(period);
  const btn = document.getElementById('attSaveBtn');
  if(btn){ btn.disabled = true; }
  const ok = await saveAttendancePeriod(date, String(period), edits);
  if(btn){ btn.disabled = false; }
  if(ok){
    alert('Attendance saved for '+date+' — Period '+period+(deptSel?' — '+deptLabel(deptSel):''));
  } else {
    alert('Could not save Period '+period+' — check your connection and try again. Nothing was overwritten.');
  }
  drawAttendanceTable();
}
async function saveAllPeriods(){
  const date = document.getElementById('attDate').value;
  const deptSel = document.getElementById('attDept').value;
  const btn = document.getElementById('attSaveBtn');
  const periodsToSave = getAssignedPeriods();
  if(btn){ btn.disabled = true; }
  let allOk = true;
  for(let i=0;i<periodsToSave.length;i++){
    const p = periodsToSave[i];
    if(btn){ btn.textContent = `Saving period ${p} (${i+1} of ${periodsToSave.length})…`; }
    const edits = collectEditsForPeriod(p);
    const ok = await saveAttendancePeriod(date, String(p), edits);
    if(!ok) allOk = false;
  }
  if(btn){ btn.disabled = false; btn.textContent = 'Save All Periods'; }
  if(allOk){
    alert('Attendance saved for Period '+periodsToSave.join(', ')+' on '+date+(deptSel?' — '+deptLabel(deptSel):''));
  } else {
    alert('Some periods could not be saved — check your connection and try again. Any period that did save was not overwritten by the others.');
  }
  drawAttendanceTable();
}

   checkboxes so a set of students can be selected, downloaded as
   CSV, and "submitted" (marked as sent) in one action.
   ============================================================ */
function mondayOf(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay(); // 0=Sun..6=Sat
  const diff = day===0 ? -6 : 1-day; // shift back to Monday
  d.setDate(d.getDate()+diff);
  return d;
}
function weekDatesFrom(mondayDate){
  const dates = [];
  for(let i=0;i<7;i++){
    const d = new Date(mondayDate);
    d.setDate(d.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}
function dayStatusForStudent(reg, date){
  const att = getAttendance();
  const dayRecord = att[date] || {};
  let anyMarked=false, anyAbsent=false, anyPresent=false;
  PERIODS.forEach(p=>{
    const periodRecord = dayRecord[p];
    if(periodRecord && periodRecord[reg]){
      anyMarked = true;
      const st = cellStatus(periodRecord[reg]);
      if(st==='absent') anyAbsent = true;
      else anyPresent = true; // present or od both count as present for this daily summary
    }
  });
  if(!anyMarked) return null;
  return anyAbsent ? 'absent' : (anyPresent ? 'present' : null);
}
function renderWeekly(c){

  const staffRec = isAdmin ? null : getStaff().find(s=>s.id===currentUser.id);
  const myDepts = isAdmin ? [] : staffDepts(staffRec);

                : `<select id="weekDept" ${myDepts.length?'disabled':''}><option value="${myDepts[0]||''}" selected>${myDepts[0]?deptFullName(myDepts[0]):'All Departments'}</option></select>`)}

function downloadWeeklyCSV(){
  const anchor = document.getElementById('weekAnchor').value;
  const monday = mondayOf(anchor);
  const dates = weekDatesFrom(monday);
  const selectedRegs = [...document.querySelectorAll('.weekRowCheck:checked')].map(cb=>cb.dataset.reg);

  if(selectedRegs.length===0){ alert('Select at least one student (use the checkbox in the header to select all).'); return; }

  const students = getStudents().filter(s=>selectedRegs.includes(s.reg));
  const rows = [['Reg No','Name','Department', ...dates]];
  students.forEach(s=>{
    const dayCells = dates.map(d => {
      const st = dayStatusForStudent(s.reg, d);
      return st ? st.toUpperCase() : 'NOT MARKED';
    });
    rows.push([s.reg, s.name, deptLabel(s.dept), ...dayCells]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `weekly_attendance_${dates[0]}_to_${dates[6]}.csv`; a.click();
  URL.revokeObjectURL(url);
  alert(`${selectedRegs.length} student(s) downloaded and marked as submitted for this week.`);
}
function drawDeptOverview(){
  const date = document.getElementById('deptOvDate').value;
  const periodSel = document.getElementById('deptOvPeriod').value; // '' = all periods
  const students = getStudents();
  const att = getAttendance();
  const dayRecord = att[date] || {};
  // Periods to include: either the single chosen period, or every period that has any records that day.
  const periodsToCount = periodSel ? [periodSel] : PERIODS.filter(p=>dayRecord[p] && Object.keys(dayRecord[p]).length);
  const tb = document.getElementById('deptOvTbody');
  const usedDepts = DEPARTMENTS.filter(d => students.some(s=>s.dept===d.code));
  tb.innerHTML = usedDepts.length? '' : `<tr><td colspan="7" class="empty">No students added yet</td></tr>`;
  let totStrength=0, totPresent=0, totAbsent=0, totOd=0, totNotMarked=0;
  usedDepts.forEach(d=>{
    const deptStudents = students.filter(s=>s.dept===d.code);
    let present=0, absent=0, od=0;
    const slots = Math.max(periodsToCount.length, 1); // instances-per-student expected (avoid /0)
    periodsToCount.forEach(p=>{
      const periodRecord = dayRecord[p] || {};
      deptStudents.forEach(s=>{
        const st = cellStatus(periodRecord[s.reg]);
        if(st==='present') present++;
        else if(st==='absent') absent++;
        else if(st==='od') od++;
      });
    });
    const strength = deptStudents.length * slots;
    const notMarked = strength - (present+absent+od);
    const pct = strength ? Math.round((present+od)/strength*100) : 0;
    totStrength+=strength; totPresent+=present; totAbsent+=absent; totOd+=od; totNotMarked+=notMarked;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><span class="badge-dept" title="${d.name}">${d.code}</span></td><td>${deptStudents.length}</td>
      <td>${present}</td><td>${absent}</td><td>${od}</td><td>${notMarked}</td>
      <td><span class="pill ${pct>=75?'present':'absent'}">${pct}%</span></td>`;
    tb.appendChild(tr);
  });
  if(usedDepts.length){
    const totPct = totStrength ? Math.round((totPresent+totOd)/totStrength*100) : 0;
    const trTot = document.createElement('tr');
    trTot.style.fontWeight='700';
    trTot.innerHTML = `<td>Overall${periodSel?' (Period '+periodSel+')':(periodsToCount.length? ' (all '+periodsToCount.length+' marked periods)':'')}</td><td>${students.length}</td><td>${totPresent}</td><td>${totAbsent}</td><td>${totOd}</td><td>${totNotMarked}</td>
      <td><span class="pill ${totPct>=75?'present':'absent'}">${totPct}%</span></td>`;
    tb.appendChild(trTot);
  }
}
function drawReportTable(){

function saveChangePassword(){
  const isAdmin = currentRole==='admin';
  const isPrincipal = currentRole==='principal';
  const current = document.getElementById('cpCurrent').value;
  const next = document.getElementById('cpNew').value;
  const confirm = document.getElementById('cpConfirm').value;
  const msg = document.getElementById('cpMsg');
  msg.style.color = 'var(--red)';

  if(isAdmin){
    const admin = getAdmin();
    if(current !== admin.password){ msg.textContent = 'Current password is incorrect.'; return; }
  } else if(isPrincipal){
    const principal = getPrincipal();
    if(current !== principal.password){ msg.textContent = 'Current password is incorrect.'; return; }
  } else {
    const staffRecord = getStaff().find(s=>s.id===currentUser.id);
    if(!staffRecord || current !== staffRecord.password){ msg.textContent = 'Current password is incorrect.'; return; }
  }
  if(!next || next.length < 4){ msg.textContent = 'New password must be at least 4 characters.'; return; }
  if(next !== confirm){ msg.textContent = 'New password and confirmation do not match.'; return; }

  if(isAdmin){
    const admin = getAdmin();
    const newUsername = document.getElementById('cpUsername').value.trim() || admin.username;
    const updated = {...admin, username:newUsername, password:next};
    setAdmin(updated);
    currentUser = {...updated};
  } else if(isPrincipal){
    const principal = getPrincipal();
    const newUsername = document.getElementById('cpUsername').value.trim() || principal.username;
    const updated = {...principal, username:newUsername, password:next};
    setPrincipal(updated);
    currentUser = {...updated, id:'principal'};
  } else {
    const staffList = getStaff().map(s => s.id===currentUser.id ? {...s, password:next} : s);
    setStaff(staffList);
    currentUser = {...currentUser, password:next};
  }
  msg.style.color = 'var(--green)';
  msg.textContent = 'Password updated successfully.';
  document.getElementById('cpCurrent').value='';
  document.getElementById('cpNew').value='';
  document.getElementById('cpConfirm').value='';
}
</script>
</body>
</html>
